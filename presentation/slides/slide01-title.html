<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #FBF7F4;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.gold-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6pt;
  background: #D4B896;
}
.content {
  text-align: center;
  padding: 40pt;
}
.tagline {
  font-family: Georgia, serif;
  font-size: 14pt;
  color: #D4B896;
  letter-spacing: 3pt;
  margin-bottom: 20pt;
}
h1 {
  font-family: Georgia, serif;
  font-size: 48pt;
  color: #2B3D39;
  margin: 0 0 16pt 0;
  font-weight: normal;
}
.subtitle {
  font-size: 16pt;
  color: #5A6A66;
  margin-top: 24pt;
}
.gold-line {
  width: 80pt;
  height: 2pt;
  background: #D4B896;
  margin: 30pt auto;
}
.contact {
  font-size: 11pt;
  color: #5A6A66;
  margin-top: 40pt;
}
</style>
</head>
<body>
<div class="gold-bar"></div>
<div class="content">
  <p class="tagline">NATURE MEETS DESIGN</p>
  <h1>4EverGreen</h1>
  <div class="gold-line"></div>
  <p class="subtitle">Luxury Bespoke Trees for Exceptional Spaces</p>
  <p class="contact">4evergreen.co.uk</p>
</div>
</body>
</html>
