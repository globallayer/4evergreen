<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #2B3D39;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.gold-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 6pt;
  background: #D4B896;
}
.content {
  text-align: center;
  padding: 40pt;
}
.cta {
  font-family: Georgia, serif;
  font-size: 32pt;
  color: #ffffff;
  margin: 0 0 10pt 0;
}
.tagline {
  font-size: 14pt;
  color: #D4B896;
  margin: 0 0 40pt 0;
}
.gold-line {
  width: 80pt;
  height: 2pt;
  background: #D4B896;
  margin: 0 auto 40pt auto;
}
.contact-grid {
  display: flex;
  gap: 50pt;
  justify-content: center;
  margin-bottom: 40pt;
}
.contact-item {
  text-align: center;
}
.contact-item p.label {
  font-size: 10pt;
  color: #D4B896;
  letter-spacing: 1pt;
  margin: 0 0 6pt 0;
}
.contact-item p.value {
  font-size: 14pt;
  color: #ffffff;
  margin: 0;
}
.website {
  font-family: Georgia, serif;
  font-size: 20pt;
  color: #D4B896;
  margin: 0;
}
</style>
</head>
<body>
<div class="content">
  <p class="cta">Request Your Free Consultation</p>
  <p class="tagline">Let's bring nature into your exceptional space</p>
  <div class="gold-line"></div>
  <div class="contact-grid">
    <div class="contact-item">
      <p class="label">EMAIL</p>
      <p class="value">contact@4evergreen.co.uk</p>
    </div>
    <div class="contact-item">
      <p class="label">PHONE</p>
      <p class="value">+44 7822 011 814</p>
    </div>
    <div class="contact-item">
      <p class="label">LOCATION</p>
      <p class="value">London, UK</p>
    </div>
  </div>
  <p class="website">4evergreen.co.uk</p>
</div>
<div class="gold-bar"></div>
</body>
</html>
