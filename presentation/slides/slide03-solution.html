<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #FBF7F4;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: #2B3D39;
  padding: 24pt 40pt;
}
.header h1 {
  font-family: Georgia, serif;
  font-size: 28pt;
  color: #ffffff;
  margin: 0;
  font-weight: normal;
}
.content {
  padding: 36pt 50pt;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.equation {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16pt;
  margin-bottom: 40pt;
}
.eq-box {
  padding: 18pt 24pt;
  background: #ffffff;
  border: 1pt solid #D4B896;
  text-align: center;
}
.eq-box h3 {
  font-family: Georgia, serif;
  font-size: 13pt;
  color: #2B3D39;
  margin: 0 0 6pt 0;
  font-weight: normal;
}
.eq-box p {
  font-size: 10pt;
  color: #5A6A66;
  margin: 0;
}
.eq-plus {
  font-family: Georgia, serif;
  font-size: 24pt;
  color: #D4B896;
}
.eq-result {
  padding: 18pt 28pt;
  background: #2B3D39;
  text-align: center;
}
.eq-result h3 {
  font-family: Georgia, serif;
  font-size: 14pt;
  color: #D4B896;
  margin: 0 0 6pt 0;
  font-weight: normal;
}
.eq-result p {
  font-size: 10pt;
  color: #ffffff;
  margin: 0;
}
.tagline {
  text-align: center;
  font-family: Georgia, serif;
  font-size: 18pt;
  color: #2B3D39;
  font-style: italic;
  margin-top: 30pt;
}
</style>
</head>
<body>
<div class="header">
  <h1>Our Solution</h1>
</div>
<div class="content">
  <div class="equation">
    <div class="eq-box">
      <h3>Genuine Preserved</h3>
      <p>Wood Trunks</p>
    </div>
    <p class="eq-plus">+</p>
    <div class="eq-box">
      <h3>Premium UV-Resistant</h3>
      <p>Foliage</p>
    </div>
    <p class="eq-plus">=</p>
    <div class="eq-result">
      <h3>Timeless Beauty</h3>
      <p>Zero Maintenance</p>
    </div>
  </div>
  <p class="tagline">Semi-natural trees that bring nature indoors, permanently.</p>
</div>
</body>
</html>
